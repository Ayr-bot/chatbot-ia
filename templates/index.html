<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asistente Virtual</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
<div class="chat-container">

  <div class="chat-header">
    <div class="header-left">
      <div class="header-avatar"><img src="img/sunafilito.png" alt="SUNAFIL"></div>
      <div>
        <div class="header-title">Asistente Virtual</div>
        <div class="header-sub">En línea</div>
      </div>
    </div>
    <div class="header-icons">
      <span title="Reiniciar" onclick="reiniciar()" style="cursor:pointer">↺</span>
    </div>
  </div>

  <div class="profile-card">
    <div class="profile-avatar"><img src="img/sunafilito.png" alt="SUNAFIL"></div>
    <div class="profile-name">Asistente Virtual</div>
    <div class="profile-sub">¿Cómo puedo ayudarte hoy?</div>
  </div>

  <div class="chat-messages" id="chat"></div>

  <div class="chat-input-area">
    <textarea id="msg-input" placeholder="Message..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="enviarMensaje()" title="Enviar">➤</button>
  </div>

</div>


</body>
<script src="javascript.js"></script>
</html>
